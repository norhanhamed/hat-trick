<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;

        }

        section {
            padding: 10px 20px;
            margin: 0 auto;
            width: 100%;
            min-height:  100%;
        }

        .container {
            margin: 10px 30px;
        }

        .n {
            padding: 10px 20px;
            background-image: url(imgs/main-img.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            width: 100%;
            min-height: calc(100vh - 40px);
            border-radius: 25px;
        }

        .a {
            padding: 10px 20px;
            background-image: url(imgs/bottom-ground.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            width: 100%;
            height: 500px;
            border-radius: 20px;
            margin-top: -200px;

        }

        @media screen and (max-width: 600px) {
            .n {
                background-image: url(imgs/1.png);
                background-size: cover;
                background-position: center;
                height: 30vh;
                min-height: auto;
            }

            .a {
                background-image: url(imgs/2.png);
                background-size: cover;
                background-position: center;
                       margin-top: -60px;
                       border-color: 40px;

            }
        }
    </style>
</head>

<body>
    <section>
        <div class="container">
            <div class="n">  </div>
        </div>
    </section>
    <section>
        <div class="a">
        </div>
    </section>
</body>

</html>
